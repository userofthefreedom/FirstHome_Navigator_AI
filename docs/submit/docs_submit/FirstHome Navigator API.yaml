openapi: 3.0.3
info:
  title: FirstHome Navigator API
  version: 1.0.0
  description: Backend API for housing notices, recommendations, funding plans, maps,
    and AI coach features.
paths:
  /api/account-state:
    get:
      operationId: api_account_state_retrieve
      description: 사용자가 마지막으로 선택한 공고, 주택형 옵션, 추천 스냅샷, 자금 로드맵 상태를 반환합니다.
      summary: 현재 선택 상태 조회
      tags:
      - Profile
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountStateResponse'
          description: ''
    put:
      operationId: api_account_state_update
      description: 대시보드, 상세, 자금 로드맵, AI 코치 화면 간에 공유되는 선택 상태를 저장합니다.
      summary: 현재 선택 상태 저장
      tags:
      - Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountStateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccountStateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccountStateRequest'
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountStateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/agora/comments/{comment_id}:
    put:
      operationId: api_agora_comments_update
      description: 작성자 본인만 댓글을 수정할 수 있습니다.
      summary: 청약 아고라 댓글 수정
      parameters:
      - in: path
        name: comment_id
        schema:
          type: integer
        required: true
      tags:
      - Community
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgoraComment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AgoraComment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgoraComment'
        required: true
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgoraComment'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    delete:
      operationId: api_agora_comments_destroy
      description: 작성자 본인만 댓글을 삭제할 수 있습니다.
      summary: 청약 아고라 댓글 삭제
      parameters:
      - in: path
        name: comment_id
        schema:
          type: integer
        required: true
      tags:
      - Community
      security:
      - sessionAuth: []
      - {}
      responses:
        '204':
          description: No response body
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/agora/posts:
    get:
      operationId: api_agora_posts_list
      description: 게시판 카테고리와 검색어 기준으로 청약 아고라 게시글을 최대 50개 반환합니다.
      summary: 청약 아고라 게시글 목록
      parameters:
      - in: query
        name: category
        schema:
          type: string
        description: notice, product, funding, free
      - in: query
        name: q
        schema:
          type: string
        description: 제목 검색어
      tags:
      - Community
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AgoraPost'
          description: ''
    post:
      operationId: api_agora_posts_create
      description: 로그인 사용자가 게시글을 작성합니다.
      summary: 청약 아고라 게시글 작성
      tags:
      - Community
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgoraPost'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AgoraPost'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgoraPost'
        required: true
      security:
      - sessionAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgoraPost'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/agora/posts/{post_id}:
    get:
      operationId: api_agora_posts_retrieve
      description: 댓글을 포함한 게시글 상세 정보를 반환합니다.
      summary: 청약 아고라 게시글 상세
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - Community
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgoraPost'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    put:
      operationId: api_agora_posts_update
      description: 작성자 본인만 게시글을 수정할 수 있습니다.
      summary: 청약 아고라 게시글 수정
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - Community
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgoraPost'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AgoraPost'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgoraPost'
        required: true
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgoraPost'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    delete:
      operationId: api_agora_posts_destroy
      description: 작성자 본인만 게시글을 삭제할 수 있습니다.
      summary: 청약 아고라 게시글 삭제
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - Community
      security:
      - sessionAuth: []
      - {}
      responses:
        '204':
          description: No response body
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/agora/posts/{post_id}/comments:
    post:
      operationId: api_agora_posts_comments_create
      description: 로그인 사용자가 특정 게시글에 댓글을 작성합니다.
      summary: 청약 아고라 댓글 작성
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - Community
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AgoraComment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AgoraComment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AgoraComment'
        required: true
      security:
      - sessionAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgoraComment'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/ai/chat:
    post:
      operationId: api_ai_chat_create
      description: 현재 화면 context, 선택 공고, 선택 옵션, 사용자 조건을 바탕으로 청약 관련 질문에 답변합니다.
      summary: 전역 AI 챗봇 답변
      tags:
      - AI Coach
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoachChatRequest'
            examples:
              AI챗봇요청예시:
                value:
                  notice_id: 1
                  option_id: 250
                  message: 이 옵션의 계약금 부족액과 공식 확인 포인트를 알려줘
                  profile:
                    asset: 12000000
                    monthly_saving: 1000000
                  page_context:
                    path: /ai-coach
                    page_type: ai_coach
                summary: AI 챗봇 요청 예시
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CoachChatRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CoachChatRequest'
        required: true
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachChatResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/ai/coach-summary:
    post:
      operationId: api_ai_coach_summary_create
      description: 선택 공고/주택형 옵션과 사용자 프로필을 바탕으로 이번 주 할 일, 공식 확인 포인트, 선택 기준을 생성합니다.
        로그인 사용자는 LLM 결과를 캐시합니다.
      summary: AI 코치 요약 생성
      tags:
      - AI Coach
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoachSummaryRequest'
            examples:
              AI코치요청예시:
                value:
                  notice_id: 1
                  option_id: 250
                  profile:
                    asset: 12000000
                    monthly_saving: 1000000
                  force_refresh: false
                summary: AI 코치 요청 예시
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CoachSummaryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CoachSummaryRequest'
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachSummaryResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/ai/coach-summary/latest:
    get:
      operationId: api_ai_coach_summary_latest_retrieve
      description: 대시보드에서 이미 생성된 AI 코치 결과만 가볍게 조회합니다. 새 LLM 분석은 실행하지 않습니다.
      summary: 최근 AI 코치 요약 조회
      tags:
      - AI Coach
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachSummaryResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/auth/login:
    post:
      operationId: api_auth_login_create
      description: 아이디와 비밀번호로 로그인하고 세션/클라이언트 관심 항목을 계정으로 병합합니다.
      summary: 로그인
      tags:
      - Auth / Account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentialRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthCredentialRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthCredentialRequest'
        required: true
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/auth/logout:
    post:
      operationId: api_auth_logout_create
      description: 현재 세션을 로그아웃 처리합니다.
      summary: 로그아웃
      tags:
      - Auth / Account
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutResponse'
          description: ''
  /api/auth/me:
    get:
      operationId: api_auth_me_retrieve
      description: 현재 세션의 사용자, 프로필, 계정 상태를 반환합니다. 비로그인 상태에서는 is_authenticated=false를
        반환합니다.
      summary: 현재 로그인 사용자 조회
      tags:
      - Auth / Account
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
  /api/auth/register:
    post:
      operationId: api_auth_register_create
      description: 사용자 계정을 생성하고 즉시 로그인 처리합니다. 세션/클라이언트에 있던 프로필과 관심 항목을 계정으로 병합합니다.
      summary: 회원가입
      tags:
      - Auth / Account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentialRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AuthCredentialRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AuthCredentialRequest'
        required: true
      security:
      - sessionAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/dashboard:
    get:
      operationId: api_dashboard_retrieve
      description: 현재 프로필 기준 상위 청약 후보, 후보 수, 사용자 조건을 대시보드용으로 반환합니다.
      summary: 대시보드 추천 요약
      tags:
      - Recommendations
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
          description: ''
  /api/favorites:
    get:
      operationId: api_favorites_list
      description: 관심 공고, 관심 주택형 옵션, 관심 금융상품, 관심 정책을 최근 저장순으로 반환합니다.
      summary: 관심 항목 목록 조회
      parameters:
      - in: header
        name: X-FirstHome-Client-Id
        schema:
          type: string
        description: 비로그인 사용자의 관심 항목을 브라우저 단위로 유지하기 위한 클라이언트 ID입니다.
      tags:
      - Profile
      security:
      - sessionAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FavoriteListResponse'
          description: ''
    post:
      operationId: api_favorites_create
      description: 로그인 사용자는 계정에, 비로그인 사용자는 X-FirstHome-Client-Id 또는 세션에 관심 항목을 저장합니다.
      summary: 관심 항목 저장
      parameters:
      - in: header
        name: X-FirstHome-Client-Id
        schema:
          type: string
        description: 비로그인 사용자의 관심 항목을 브라우저 단위로 유지하기 위한 클라이언트 ID입니다.
      tags:
      - Profile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FavoriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FavoriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FavoriteRequest'
        required: true
      security:
      - sessionAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavoriteResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
